# .github/workflows/vpn-updater.yml
name: VPN Configs Updater

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Run updater
      run: |
        python -c "
import requests, base64
from datetime import datetime

SOURCE_URL = 'https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/BLACK_VLESS_RUS_mobile.txt'
TARGET_REPO = 'xolirx/xolirx-vpn-api'
TARGET_FILE = 'data/vpn.txt'
TARGET_BRANCH = 'main'

HEADERS = '''#profile-title: XolirX 🟢
#profile-update-interval: 1
#subscription-userinfo: upload=1192756224000; download=0; total=0; expire=0
#support-url: https://t.me/xolirx
#profile-web-page-url: https://github.com/xolirx
#announce: ⬛ FREE VLESS ⬛ By XolirX ⬛'''

r = requests.get(SOURCE_URL, timeout=30)
r.raise_for_status()

configs = []
for line in r.text.split('\n'):
    s = line.strip()
    if s and not s.startswith('#') and (s.startswith('vless://') or s.startswith('trojan://')):
        configs.append(s)

print(f'Found {len(configs)} configs')

processed = []
for i, line in enumerate(configs, 1):
    base = line.split('#')[0]
    processed.append(f'{base}#Server #{i}')

final = HEADERS + '\n' + '\n'.join(processed)

headers = {
    'Authorization': f'token ${{ secrets.GH_TOKEN }}',
    'Accept': 'application/vnd.github.v3+json'
}
api_url = f'https://api.github.com/repos/{TARGET_REPO}/contents/{TARGET_FILE}'

r = requests.get(api_url, headers=headers)
sha = r.json().get('sha') if r.status_code == 200 else None

if sha:
    current = base64.b64decode(r.json()['content']).decode()
    if current == final:
        print('No changes')
        exit(0)

encoded = base64.b64encode(final.encode()).decode()
data = {
    'message': f'Update - {datetime.now().strftime(\"%Y-%m-%d %H:%M\")}',
    'content': encoded,
    'branch': TARGET_BRANCH
}
if sha:
    data['sha'] = sha

r = requests.put(api_url, headers=headers, json=data)
print(f'Updated: {r.status_code}')
"
      env:
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
